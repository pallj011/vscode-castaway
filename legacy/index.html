<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Johnny Castaway - Modern Recreation</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Johnny Castaway</h1>
            <div class="controls">
                <button id="graphicsToggle" class="btn">Graphics: Classic</button>
                <button id="pauseToggle" class="btn">Pause</button>
                <button id="nextScene" class="btn">Next Scene</button>
                <div class="info">
                    <span id="currentScene">Scene: Idle</span>
                    <span id="timeDisplay"></span>
                </div>
            </div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div class="footer">
            <p>A recreation of the classic 1992 screensaver by Sierra On-Line/Dynamix</p>
            <p>Original design by Jeff Tunnell Productions | Character design by Shawn Bird</p>
        </div>
    </div>

    <script src="calendar.js"></script>
    <script src="renderer.js"></script>
    <script src="scenes.js"></script>
    <script src="engine.js"></script>
    <script src="main.js"></script>
</body>
</html>
